<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور الدين - امتحانات تفاعلية</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Amiri', 'Traditional Arabic', 'Scheherazade', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a2f1f, #2d4a33);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M25,30 L75,30 L80,50 L75,70 L25,70 L20,50 L25,30" fill="none" stroke="%23d4af37" stroke-width="2"/><circle cx="50" cy="40" r="5" fill="%23d4af37"/><path d="M40,55 L60,55" stroke="%23d4af37" stroke-width="2"/></svg>');
            background-repeat: repeat;
            background-size: 100px 100px;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: linear-gradient(145deg, #fef9e7, #f5e9d8);
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 2px #b7935e, 0 0 0 5px #6b4f2a;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .container::before {
            content: "﷽";
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 1.8em;
            color: #b7935e;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            opacity: 0.4;
            font-weight: bold;
        }

        .header {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid #b7935e;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "✿";
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 80px;
            color: rgba(183, 147, 94, 0.2);
            transform: rotate(15deg);
        }

        .header::after {
            content: "✿";
            position: absolute;
            bottom: -20px;
            left: -10px;
            font-size: 80px;
            color: rgba(183, 147, 94, 0.2);
            transform: rotate(-10deg);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-family: 'Traditional Arabic', 'Amiri', serif;
            letter-spacing: 2px;
        }

        .header h1 span {
            display: inline-block;
            background: #b7935e;
            color: #0f4e3a;
            padding: 0 15px;
            border-radius: 50px;
            font-size: 0.8em;
            margin: 0 5px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
            font-style: italic;
        }

        .main-menu {
            padding: 40px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            background: linear-gradient(145deg, #fef9e7, #faedd9);
            position: relative;
        }

        .main-menu::before {
            content: "";
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b7935e, #8b6b42, #b7935e, transparent);
        }

        .menu-btn {
            background: linear-gradient(145deg, #faf0db, #eddbbd);
            border: 2px solid #8b6b42;
            color: #1b3b2b;
            padding: 25px 10px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 30px 30px 15px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-family: 'Traditional Arabic', 'Amiri', serif;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: "﴿﴾";
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 1em;
            color: #b7935e;
            opacity: 0.3;
        }

        .menu-btn::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #b7935e, #ffd966, #b7935e);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-btn:hover {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(15, 78, 58, 0.4);
            border-color: #f5d7a1;
        }

        .menu-btn:hover::after {
            opacity: 1;
        }

        .menu-btn.special {
            background: linear-gradient(145deg, #8b1538, #5a0c25);
            color: #f5d7a1;
            border-color: #d4af37;
            grid-column: span 2;
        }

        .menu-btn.special:hover {
            background: linear-gradient(145deg, #5a0c25, #3d0819);
            border-color: #ffd966;
        }

        .quiz-area {
            padding: 35px;
            background: linear-gradient(145deg, #fef9e7, #f8ebd2);
            position: relative;
        }

        .quiz-area::before {
            content: "〆";
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 40px;
            color: #b7935e;
            opacity: 0.2;
            transform: rotate(10deg);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            border-radius: 50px;
            color: #f5d7a1;
            border: 1px solid #b7935e;
        }

        .progress {
            background-color: #3d2b1a;
            border-radius: 50px;
            height: 12px;
            flex-grow: 1;
            margin: 0 20px;
            border: 1px solid #b7935e;
        }

        .progress-bar {
            height: 12px;
            background: linear-gradient(90deg, #b7935e, #f5d7a1, #b7935e);
            border-radius: 50px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-text {
            font-size: 1.5em;
            font-weight: 600;
            color: #1b3b2b;
            margin-bottom: 30px;
            line-height: 1.8;
            padding: 20px;
            background: rgba(183, 147, 94, 0.1);
            border-radius: 30px;
            border-right: 8px solid #b7935e;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .option {
            background: linear-gradient(145deg, #fff5e6, #f5e0c5);
            border: 2px solid #b7935e;
            border-radius: 50px;
            padding: 18px 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.2em;
            color: #1b3b2b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
            padding-right: 60px;
        }

        .option::before {
            content: "○";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3em;
            color: #b7935e;
            transition: all 0.2s ease;
        }

        .option:hover {
            background: linear-gradient(145deg, #eddbbd, #e0c9a5);
            border-color: #8b6b42;
            transform: translateX(-5px);
            box-shadow: 0 10px 20px rgba(139, 107, 66, 0.2);
        }

        .option:hover::before {
            content: "◉";
            color: #0f4e3a;
        }

        .option.selected {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            border-color: #d4af37;
        }

        .option.selected::before {
            content: "◉";
            color: #f5d7a1;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #6b4f2a;
            color: #f5d7a1;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            border: 2px solid transparent;
        }

        .nav-btn:enabled {
            background: linear-gradient(145deg, #8b6b42, #5a3e1f);
            border-color: #b7935e;
        }

        .nav-btn:enabled:hover {
            background: linear-gradient(145deg, #5a3e1f, #3d2b1a);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(90, 62, 31, 0.3);
            border-color: #f5d7a1;
            color: #ffffff;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #6c757d;
        }

        .result-area {
            padding: 40px 30px;
            text-align: center;
            background: linear-gradient(145deg, #fef9e7, #f5e0c5);
        }

        .score-card {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            padding: 35px;
            border-radius: 50px;
            margin-bottom: 40px;
            border: 3px solid #b7935e;
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: "★";
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 40px;
            color: #b7935e;
            opacity: 0.3;
            animation: spin 10s linear infinite;
        }

        .score-card::after {
            content: "★";
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 30px;
            color: #b7935e;
            opacity: 0.3;
            animation: spin 8s linear infinite reverse;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .score {
            font-size: 5em;
            font-weight: bold;
            margin: 15px 0;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .details-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: 25px;
            font-size: 0.95em;
        }

        .details-table th {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            padding: 15px;
            font-weight: bold;
            border: 2px solid #b7935e;
        }

        .details-table th:first-child {
            border-radius: 30px 0 0 30px;
        }

        .details-table th:last-child {
            border-radius: 0 30px 30px 0;
        }

        .details-table td {
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #b7935e;
        }

        .details-table td:first-child {
            border-radius: 20px 0 0 20px;
        }

        .details-table td:last-child {
            border-radius: 0 20px 20px 0;
        }

        .correct-answer {
            color: #0f4e3a;
            font-weight: bold;
            background: rgba(15, 78, 58, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .wrong-answer {
            color: #8b1538;
            font-weight: bold;
            background: rgba(139, 21, 56, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .back-btn {
            background: linear-gradient(145deg, #8b6b42, #5a3e1f);
            color: #f5d7a1;
            border: 3px solid #b7935e;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            font-family: 'Traditional Arabic', 'Amiri', serif;
        }

        .back-btn:hover {
            background: linear-gradient(145deg, #5a3e1f, #3d2b1a);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(90, 62, 31, 0.4);
            border-color: #f5d7a1;
            color: #ffffff;
        }

        .hidden {
            display: none;
        }

        /* تزيين إضافي */
        .islamic-pattern {
            height: 10px;
            background: linear-gradient(90deg, #0f4e3a 20%, #b7935e 40%, #f5d7a1 60%, #b7935e 80%, #0f4e3a 100%);
            margin: 5px 0;
        }

        .footer-text {
            text-align: center;
            padding: 15px;
            background: #0f4e3a;
            color: #b7935e;
            font-size: 0.9em;
            border-top: 3px solid #b7935e;
        }

        .footer-text span {
            color: #f5d7a1;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- رأس الموقع -->
        <div class="header">
            <h1>📖 <span>نور</span> الدين <span>✨</span></h1>
            <p>وَ قُلْ رَبِّ زِدْنِي عِلْمًا</p>
            <div class="islamic-pattern"></div>
        </div>

        <!-- القائمة الرئيسية -->
        <div id="mainMenu" class="main-menu">
            <button class="menu-btn" onclick="startQuiz(1)">الوحدة الأولى</button>
            <button class="menu-btn" onclick="startQuiz(2)">الوحدة الثانية</button>
            <button class="menu-btn" onclick="startQuiz(3)">الوحدة الثالثة</button>
            <button class="menu-btn" onclick="startQuiz(4)">الوحدة الرابعة</button>
            <button class="menu-btn special" onclick="startQuiz('final')">📝 الامتحان الشامل</button>
        </div>

        <!-- منطقة الامتحان -->
        <div id="quizArea" class="quiz-area hidden">
            <div class="question-header">
                <span id="questionCounter">سؤال 1/20</span>
                <div class="progress">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>
            
            <div id="questionText" class="question-text">جاري تحميل السؤال...</div>
            
            <div id="optionsContainer" class="options">
                <!-- الخيارات ستظهر هنا -->
            </div>

            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn" onclick="previousQuestion()" disabled>⬅️ السابق</button>
                <button id="nextBtn" class="nav-btn" onclick="nextQuestion()">التالي ➡️</button>
            </div>
        </div>

        <!-- منطقة النتيجة -->
        <div id="resultArea" class="result-area hidden">
            <div class="score-card">
                <h2>نتيجتك في الاختبار</h2>
                <div id="scoreDisplay" class="score">0/0</div>
                <p id="percentageDisplay">0%</p>
                <p style="font-size: 1.2em;">﴿ فَمَنْ يَعْمَلْ مِثْقَالَ ذَرَّةٍ خَيْرًا يَرَهُ ﴾</p>
            </div>

            <h3 style="margin-bottom: 20px; color: #0f4e3a;">تفاصيل الإجابات:</h3>
            <div id="detailsContainer"></div>

            <button class="back-btn" onclick="backToMenu()">العودة للقائمة الرئيسية</button>
        </div>

        <!-- تذييل -->
        <div class="footer-text">
            <span>✿</span> بسم الله الرحمن الرحيم <span>✿</span>
        </div>
    </div>

    <script>
        // قاعدة البيانات: جميع الأسئلة من الوحدات الأربع
        const allQuestions = {
            1: [ // الوحدة الأولى
                { question: "كم عدد آيات سورة البقرة؟", options: ["284 آية", "285 آية", "286 آية", "287 آية"], answer: 2 },
                { question: "أي مما يأتي يُعد مثالاً على 'دليل الهداية' لوجود الله تعالى؟", options: ["دوران الأرض حول الشمس", "اهتداء الطفل للرضاعة ساعة ولادته", "تكوين جسم الإنسان", "تعاقب الليل والنهار"], answer: 1 },
                { question: "ما المقصود بـ 'الفطرة'؟", options: ["القوانين العلمية في الكون", "الطبيعة السليمة التي خلق الله الناس عليها", "التفكير العقلي المحض", "اتباع ما وجدنا عليه آباءنا"], answer: 1 },
                { question: "أي من مراحل التحدي بالقرآن الكريم كانت الأخيرة؟", options: ["التحدي بالقرآن كاملاً", "التحدي بعشر سور", "التحدي بسورة واحدة", "التحدي بآية واحدة"], answer: 2 },
                { question: "ما هو 'الاجتهاد' في الاصطلاح الشرعي؟", options: ["بذل الفقيه وسعه لاستنباط الأحكام الشرعية العملية", "حفظ القرآن الكريم والسنة", "تقليد آراء العلماء السابقين", "العمل الصالح في رمضان"], answer: 0 },
                { question: "تقع مسؤولية تغيير المنكر 'بالقلب' على:", options: ["الحاكم فقط", "أهل العلم فقط", "جميع المسلمين", "الرجال دون النساء"], answer: 2 },
                { question: "من آثار الإيمان باليوم الآخر في حياة المسلم:", options: ["السعي لطلب المال بشتى الطرق", "الاستقامة في العمل والتزام الصلاح", "إهمال عمارة الأرض", "كثرة الجدال مع الآخرين"], answer: 1 },
                { question: "جميع السور الآتية من 'السبع الطوال' ما عدا سورة:", options: ["البقرة", "النساء", "الرعد", "المائدة"], answer: 2 },
                { question: "تظهر سعة علم الله تعالى في قوله سبحانه:", options: ["﴿لِلَّهِ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ﴾", "﴿لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا﴾", "﴿قُلْ إِنَّمَا الْعِلْمُ عِنْدَ اللَّهِ﴾", "﴿إِنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ﴾"], answer: 2 },
                { question: "لماذا قُدم ذكر الإيمان بالملائكة على الكتب والرسل في الآية؟", options: ["لأن الملائكة أفضل من البشر", "لأن الملك هو الذي ينزل بالوحي على الرسول", "لأن عددهم أكثر", "لا توجد حكمة محددة"], answer: 1 },
                { question: "ما حكم الاجتهاد بالنسبة لعلماء المسلمين في كل عصر؟", options: ["مندوب", "مباح", "واجب", "مكروه"], answer: 2 },
                { question: "أي من المسائل الآتية لا يجوز فيها الاجتهاد؟", options: ["كيفية الصلاة في الطائرة", "عدد ركعات الصلوات المفروضة", "أطفال الأنابيب", "عمليات زراعة الأعضاء"], answer: 1 },
                { question: "أين يقع مقر مجمع الفقه الإسلامي الدولي؟", options: ["عمان", "القاهرة", "جدة", "مكة المكرمة"], answer: 2 },
                { question: "ما حكم التبرع بالأعضاء البشرية أثناء حياة المتبرع بشرط عدم الضرر؟", options: ["حرام", "مكروه", "جائز", "واجب"], answer: 2 },
                { question: "ما حكم بيع الأعضاء البشرية في الإسلام؟", options: ["جائز للحاجة", "حرام", "مندوب", "مباح"], answer: 1 },
                { question: "الدليل الذي يقوم على أن لكل معلول علة ولكل حادث محدثاً هو:", options: ["دليل الإتقان", "دليل الهداية", "دليل السببية", "الدليل النقلي"], answer: 2 },
                { question: "معنى كلمة 'غفرانك' في سورة البقرة هو:", options: ["طلب الرزق", "طلب المسامحة وترك المعاقبة على الذنب", "شكر الله", "طلب العلم"], answer: 1 },
                { question: "تقع مسؤولية تغيير المنكر 'باليد' على:", options: ["كل فرد في المجتمع", "أصحاب السلطة", "الأطفال", "كبار السن فقط"], answer: 1 },
                { question: "الحدث المرتبط بالنفخة الأولى في الصور هو:", options: ["بعث الناس من القبور", "تطاير الصحف", "تناثر النجوم واختلال نظام الكون", "الورود على الحوض"], answer: 2 },
                { question: "المكان الذي يجمع الله فيه الناس يوم القيامة يُسمى:", options: ["البرزخ", "المحشر", "الجنة", "الفردوس"], answer: 1 }
            ],
            2: [ // الوحدة الثانية

                { question: "ما المقصود بـ 'المسؤولية المجتمعية'؟", options: ["عمل الفرد لمصلحته الشخصية فقط", "قيام أفراد المجتمع بواجباتهم لتحقيق النفع العام", "انتظار المساعدة من الآخرين", "عزل النفس عن مشاكل المجتمع"], answer: 1 },
                { question: "حقوق الإنسان في الإسلام هي حقوق:", options: ["مكتسبة من القوانين الوضعية", "منح إلهية لا يجوز الاعتداء عليها", "قابلة للتغيير حسب الزمان", "خاصة بالمسلمين فقط"], answer: 1 },
                { question: "يشير قوله تعالى ﴿لَا إِكْرَاهَ فِي الدِّينِ﴾ إلى حق:", options: ["الحياة", "التملك", "التدين (حرية الاعتقاد)", "التعليم"], answer: 2 }

        // متغيرات التطبيق
        let currentQuiz = {
            questions: [],
            userAnswers: [],
            currentIndex: 0,
            totalQuestions: 0
        };

        let currentUnit = null;

        // عناصر DOM
        const mainMenu = document.getElementById('mainMenu');
        const quizArea = document.getElementById('quizArea');
        const resultArea = document.getElementById('resultArea');
        const questionText = document.getElementById('questionText');
        const optionsContainer = document.getElementById('optionsContainer');
        const prevBtn = document.getElementById('prevBtn');
        const questionCounter = document.getElementById('questionCounter');
        const progressBar = document.getElementById('progressBar');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const percentageDisplay = document.getElementById('percentageDisplay');
        const detailsContainer = document.getElementById('detailsContainer');

        // بدء الامتحان
        window.startQuiz = function(unit) {
            currentUnit = unit;
            
            // تجهيز الأسئلة
            if (unit === 'final') {
                // الامتحان الشامل: خلط 50 سؤال من جميع الوحدات
                let allUnitQuestions = [];
                for (let i = 1; i <= 4; i++) {
                    allUnitQuestions = allUnitQuestions.concat(allQuestions[i]);
                }
                // خلط الأسئلة
                currentQuiz.questions = shuffleArray(allUnitQuestions).slice(0, 50);
            } else {
                // وحدة محددة: نسخ الأسئلة
                currentQuiz.questions = [...allQuestions[unit]];
            }

            currentQuiz.totalQuestions = currentQuiz.questions.length;
            currentQuiz.userAnswers = new Array(currentQuiz.totalQuestions).fill(null);
            currentQuiz.currentIndex = 0;

            // إخفاء وإظهار العناصر
            mainMenu.classList.add('hidden');
            quizArea.classList.remove('hidden');
            resultArea.classList.add('hidden');

            // عرض أول سؤال
            displayQuestion();
            updateNavButtons();
        };

        // خلط المصفوفة (للفلاش)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // عرض السؤال الحالي
        function displayQuestion() {
            const q = currentQuiz.questions[currentQuiz.currentIndex];
            questionText.textContent = q.question;

            // إنشاء خيارات
            let optionsHtml = '';
            q.options.forEach((opt, index) => {
                const isSelected = currentQuiz.userAnswers[currentQuiz.currentIndex] === index;
                optionsHtml += `<div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${index})">${opt}</div>`;
            });
            optionsContainer.innerHTML = optionsHtml;

            // تحديث العداد وشريط التقدم
            questionCounter.textContent = `سؤال ${currentQuiz.currentIndex + 1}/${currentQuiz.totalQuestions}`;
            progressBar.style.width = `${((currentQuiz.currentIndex + 1) / currentQuiz.totalQuestions) * 100}%`;
        }

        // اختيار إجابة
        window.selectOption = function(optionIndex) {
            // حفظ الإجابة
            currentQuiz.userAnswers[currentQuiz.currentIndex] = optionIndex;

            // تحديث شكل الخيارات
            const options = document.querySelectorAll('.option');
            options.forEach((opt, idx) => {
                if (idx === optionIndex) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });

            // الانتقال التلقائي للسؤال التالي إذا لم يكن الأخير
            if (currentQuiz.currentIndex < currentQuiz.totalQuestions - 1) {
                setTimeout(() => {
                    nextQuestion();
                }, 300);
            }
        };

        // السؤال التالي
        window.nextQuestion = function() {
            if (currentQuiz.currentIndex < currentQuiz.totalQuestions - 1) {
                currentQuiz.currentIndex++;
                displayQuestion();
                updateNavButtons();
            } else {
                // إذا كان هذا هو آخر سؤال، نعرض النتيجة
                showResults();
            }
        };

        // السؤال السابق
        window.previousQuestion = function() {
            if (currentQuiz.currentIndex > 0) {
                currentQuiz.currentIndex--;
                displayQuestion();
                updateNavButtons();
            }
        };

        // تحديث حالة أزرار التنقل
        function updateNavButtons() {
            prevBtn.disabled = currentQuiz.currentIndex === 0;
        }

        // عرض النتائج
        function showResults() {
            // حساب النتيجة
            let score = 0;
            currentQuiz.questions.forEach((q, index) => {
                if (currentQuiz.userAnswers[index] === q.answer) {
                    score++;
                }
            });

            // إخفاء منطقة الامتحان وإظهار النتيجة
            quizArea.classList.add('hidden');
            resultArea.classList.remove('hidden');

            // عرض النتيجة الإجمالية
            scoreDisplay.textContent = `${score}/${currentQuiz.totalQuestions}`;
            const percentage = Math.round((score / currentQuiz.totalQuestions) * 100);
            percentageDisplay.textContent = `${percentage}%`;

            // عرض التفاصيل
            let detailsHtml = '<table class="details-table"><tr><th>السؤال</th><th>إجابتك</th><th>الإجابة الصحيحة</th></tr>';
            currentQuiz.questions.forEach((q, index) => {
                const userAns = currentQuiz.userAnswers[index];
                const userAnsText = userAns !== null ? q.options[userAns] : 'لم تجب';
                const correctAnsText = q.options[q.answer];
                const isCorrect = userAns === q.answer;

                detailsHtml += `<tr>
                    <td>${q.question}</td>
                    <td class="${isCorrect ? 'correct-answer' : 'wrong-answer'}">${userAnsText}</td>
                    <td class="correct-answer">${correctAnsText}</td>
                </tr>`;
            });
            detailsHtml += '</table>';
            detailsContainer.innerHTML = detailsHtml;
        }

        // العودة للقائمة الرئيسية
        window.backToMenu = function() {
            mainMenu.classList.remove('hidden');
            quizArea.classList.add('hidden');
            resultArea.classList.add('hidden');
        };
    </script>
