<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نور الدين - امتحانات تفاعلية</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Amiri', 'Traditional Arabic', 'Scheherazade', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a2f1f, #2d4a33);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M25,30 L75,30 L80,50 L75,70 L25,70 L20,50 L25,30" fill="none" stroke="%23d4af37" stroke-width="2"/><circle cx="50" cy="40" r="5" fill="%23d4af37"/><path d="M40,55 L60,55" stroke="%23d4af37" stroke-width="2"/></svg>');
            background-repeat: repeat;
            background-size: 100px 100px;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: linear-gradient(145deg, #fef9e7, #f5e9d8);
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3), 0 0 0 2px #b7935e, 0 0 0 5px #6b4f2a;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .container::before {
            content: "﷽";
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 1.8em;
            color: #b7935e;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            opacity: 0.4;
            font-weight: bold;
            z-index: 1;
        }

        .header {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid #b7935e;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "✿";
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 80px;
            color: rgba(183, 147, 94, 0.2);
            transform: rotate(15deg);
        }

        .header::after {
            content: "✿";
            position: absolute;
            bottom: -20px;
            left: -10px;
            font-size: 80px;
            color: rgba(183, 147, 94, 0.2);
            transform: rotate(-10deg);
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-family: 'Traditional Arabic', 'Amiri', serif;
            letter-spacing: 2px;
        }

        .header h1 span {
            display: inline-block;
            background: #b7935e;
            color: #0f4e3a;
            padding: 0 15px;
            border-radius: 50px;
            font-size: 0.8em;
            margin: 0 5px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.95;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5em;
            color: #0f4e3a;
        }

        .loading::after {
            content: "⠋⠙⠹⠸⠼⠴⠦⠧";
            animation: spinDots 0.8s steps(8) infinite;
            display: inline-block;
            font-size: 1.2em;
        }

        @keyframes spinDots {
            0% { content: "⠋"; }
            12.5% { content: "⠙"; }
            25% { content: "⠹"; }
            37.5% { content: "⠸"; }
            50% { content: "⠼"; }
            62.5% { content: "⠴"; }
            75% { content: "⠦"; }
            87.5% { content: "⠧"; }
        }

        .main-menu {
            padding: 40px 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 20px;
            background: linear-gradient(145deg, #fef9e7, #faedd9);
            position: relative;
        }

        .main-menu::before {
            content: "";
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #b7935e, #8b6b42, #b7935e, transparent);
        }

        .menu-btn {
            background: linear-gradient(145deg, #faf0db, #eddbbd);
            border: 2px solid #8b6b42;
            color: #1b3b2b;
            padding: 25px 10px;
            font-size: 1.3em;
            font-weight: bold;
            border-radius: 30px 30px 15px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            font-family: 'Traditional Arabic', 'Amiri', serif;
            position: relative;
            overflow: hidden;
        }

        .menu-btn::before {
            content: "﴿﴾";
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 1em;
            color: #b7935e;
            opacity: 0.3;
        }

        .menu-btn::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #b7935e, #ffd966, #b7935e);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-btn:hover {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            transform: translateY(-8px);
            box-shadow: 0 20px 30px rgba(15, 78, 58, 0.4);
            border-color: #f5d7a1;
        }

        .menu-btn:hover::after {
            opacity: 1;
        }

        .menu-btn.special {
            background: linear-gradient(145deg, #8b1538, #5a0c25);
            color: #f5d7a1;
            border-color: #d4af37;
            grid-column: span 2;
        }

        .menu-btn.special:hover {
            background: linear-gradient(145deg, #5a0c25, #3d0819);
            border-color: #ffd966;
        }

        .menu-btn:disabled {
            opacity: 0.6;
            cursor: wait;
            transform: none;
        }

        .quiz-area {
            padding: 35px;
            background: linear-gradient(145deg, #fef9e7, #f8ebd2);
            position: relative;
            min-height: 500px;
        }

        .quiz-area::before {
            content: "〆";
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 40px;
            color: #b7935e;
            opacity: 0.2;
            transform: rotate(10deg);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px 20px;
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            border-radius: 50px;
            color: #f5d7a1;
            border: 1px solid #b7935e;
        }

        .progress {
            background-color: #3d2b1a;
            border-radius: 50px;
            height: 12px;
            flex-grow: 1;
            margin: 0 20px;
            border: 1px solid #b7935e;
        }

        .progress-bar {
            height: 12px;
            background: linear-gradient(90deg, #b7935e, #f5d7a1, #b7935e);
            border-radius: 50px;
            width: 0%;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .question-text {
            font-size: 1.5em;
            font-weight: 600;
            color: #1b3b2b;
            margin-bottom: 30px;
            line-height: 1.8;
            padding: 20px;
            background: rgba(183, 147, 94, 0.1);
            border-radius: 30px;
            border-right: 8px solid #b7935e;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }

        .option {
            background: linear-gradient(145deg, #fff5e6, #f5e0c5);
            border: 2px solid #b7935e;
            border-radius: 50px;
            padding: 18px 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.2em;
            color: #1b3b2b;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
            padding-right: 60px;
        }

        .option::before {
            content: "○";
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3em;
            color: #b7935e;
            transition: all 0.2s ease;
        }

        .option:hover {
            background: linear-gradient(145deg, #eddbbd, #e0c9a5);
            border-color: #8b6b42;
            transform: translateX(-5px);
            box-shadow: 0 10px 20px rgba(139, 107, 66, 0.2);
        }

        .option:hover::before {
            content: "◉";
            color: #0f4e3a;
        }

        .option.selected {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            border-color: #d4af37;
        }

        .option.selected::before {
            content: "◉";
            color: #f5d7a1;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background-color: #6b4f2a;
            color: #f5d7a1;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            border: 2px solid transparent;
        }

        .nav-btn:enabled {
            background: linear-gradient(145deg, #8b6b42, #5a3e1f);
            border-color: #b7935e;
        }

        .nav-btn:enabled:hover {
            background: linear-gradient(145deg, #5a3e1f, #3d2b1a);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(90, 62, 31, 0.3);
            border-color: #f5d7a1;
            color: #ffffff;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #6c757d;
        }

        .result-area {
            padding: 40px 30px;
            text-align: center;
            background: linear-gradient(145deg, #fef9e7, #f5e0c5);
        }

        .score-card {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            padding: 35px;
            border-radius: 50px;
            margin-bottom: 40px;
            border: 3px solid #b7935e;
            position: relative;
            overflow: hidden;
        }

        .score-card::before {
            content: "★";
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 40px;
            color: #b7935e;
            opacity: 0.3;
            animation: spin 10s linear infinite;
        }

        .score-card::after {
            content: "★";
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 30px;
            color: #b7935e;
            opacity: 0.3;
            animation: spin 8s linear infinite reverse;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .score {
            font-size: 5em;
            font-weight: bold;
            margin: 15px 0;
            font-family: 'Traditional Arabic', 'Amiri', serif;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
        }

        .details-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
            margin-top: 25px;
            font-size: 0.95em;
        }

        .details-table th {
            background: linear-gradient(145deg, #0f4e3a, #1b3b2b);
            color: #f5d7a1;
            padding: 15px;
            font-weight: bold;
            border: 2px solid #b7935e;
        }

        .details-table th:first-child {
            border-radius: 30px 0 0 30px;
        }

        .details-table th:last-child {
            border-radius: 0 30px 30px 0;
        }

        .details-table td {
            padding: 15px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #b7935e;
        }

        .details-table td:first-child {
            border-radius: 20px 0 0 20px;
        }

        .details-table td:last-child {
            border-radius: 0 20px 20px 0;
        }

        .correct-answer {
            color: #0f4e3a;
            font-weight: bold;
            background: rgba(15, 78, 58, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .wrong-answer {
            color: #8b1538;
            font-weight: bold;
            background: rgba(139, 21, 56, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .back-btn {
            background: linear-gradient(145deg, #8b6b42, #5a3e1f);
            color: #f5d7a1;
            border: 3px solid #b7935e;
            padding: 18px 50px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
            font-family: 'Traditional Arabic', 'Amiri', serif;
        }

        .back-btn:hover {
            background: linear-gradient(145deg, #5a3e1f, #3d2b1a);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(90, 62, 31, 0.4);
            border-color: #f5d7a1;
            color: #ffffff;
        }

        .hidden {
            display: none;
        }

        .islamic-pattern {
            height: 10px;
            background: linear-gradient(90deg, #0f4e3a 20%, #b7935e 40%, #f5d7a1 60%, #b7935e 80%, #0f4e3a 100%);
            margin: 5px 0;
        }

        .footer-text {
            text-align: center;
            padding: 15px;
            background: #0f4e3a;
            color: #b7935e;
            font-size: 0.9em;
            border-top: 3px solid #b7935e;
        }

        .footer-text span {
            color: #f5d7a1;
        }

        .error-message {
            text-align: center;
            padding: 50px;
            color: #8b1538;
            font-size: 1.2em;
            background: #fff5e6;
            border-radius: 20px;
            margin: 20px;
        }

        .error-message button {
            margin-top: 20px;
            padding: 10px 30px;
            background: #0f4e3a;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1em;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="header">
            <h1>📖 <span>نور</span> الدين <span>✨</span></h1>
            <p>وَ قُلْ رَبِّ زِدْنِي عِلْمًا</p>
            <div class="islamic-pattern"></div>
        </div>

        <div id="mainMenu" class="main-menu">
            <button class="menu-btn" onclick="loadUnit(1)">الوحدة الأولى</button>
            <button class="menu-btn" onclick="loadUnit(2)">الوحدة الثانية</button>
            <button class="menu-btn" onclick="loadUnit(3)">الوحدة الثالثة</button>
            <button class="menu-btn" onclick="loadUnit(4)">الوحدة الرابعة</button>
            <button class="menu-btn special" onclick="loadFinalExam()">📝 الامتحان الشامل</button>
        </div>

        <div id="quizArea" class="quiz-area hidden">
            <div class="question-header">
                <span id="questionCounter">سؤال 1/20</span>
                <div class="progress">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>
            <div id="questionText" class="question-text">جاري تحميل السؤال...</div>
            <div id="optionsContainer" class="options"></div>
            <div class="nav-buttons">
                <button id="prevBtn" class="nav-btn" onclick="previousQuestion()" disabled>⬅️ السابق</button>
                <button id="nextBtn" class="nav-btn" onclick="nextQuestion()">التالي ➡️</button>
            </div>
        </div>

        <div id="resultArea" class="result-area hidden">
            <div class="score-card">
                <h2>نتيجتك في الاختبار</h2>
                <div id="scoreDisplay" class="score">0/0</div>
                <p id="percentageDisplay">0%</p>
                <p style="font-size: 1.2em;">﴿ فَمَنْ يَعْمَلْ مِثْقَالَ ذَرَّةٍ خَيْرًا يَرَهُ ﴾</p>
            </div>
            <h3 style="margin-bottom: 20px; color: #0f4e3a;">تفاصيل الإجابات:</h3>
            <div id="detailsContainer"></div>
            <button class="back-btn" onclick="backToMenu()">العودة للقائمة الرئيسية</button>
        </div>

        <div class="footer-text">
            <span>✿</span> بسم الله الرحمن الرحيم <span>✿</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
